<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ULTRA_ADVANCED_QUANTUM_AUTH</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&family=Syncopate:wght@400;700&display=swap');

    :root {
      --glow: #00ff41; /* Classic Hacker Green */
      --bg: #000500;
    }

    body, html {
      margin: 0; padding: 0; height: 100vh;
      background: var(--bg);
      font-family: 'Fira Code', monospace;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }

    canvas { position: absolute; top: 0; left: 0; z-index: 1; filter: blur(1px); }

    .interface-layer {
      position: relative; z-index: 10;
      width: 450px; perspective: 2000px;
    }

    .quantum-card {
      background: rgba(0, 20, 0, 0.85);
      border: 1px solid var(--glow);
      box-shadow: 0 0 20px rgba(0, 255, 65, 0.2), inset 0 0 10px rgba(0, 255, 65, 0.1);
      border-radius: 2px; /* Brutalist sharp edges */
      padding: 40px;
      transform-style: preserve-3d;
      position: relative;
    }

    /* Corner brackets for advanced look */
    .quantum-card::before, .quantum-card::after {
      content: ''; position: absolute; width: 20px; height: 20px;
      border: 2px solid var(--glow);
    }
    .quantum-card::before { top: -5px; left: -5px; border-right: 0; border-bottom: 0; }
    .quantum-card::after { bottom: -5px; right: -5px; border-left: 0; border-top: 0; }

    .boot-text {
      font-size: 0.7rem; color: var(--glow);
      text-transform: uppercase; margin-bottom: 20px;
      opacity: 0.8; height: 50px; overflow: hidden;
    }

    h2 {
      font-family: 'Syncopate', sans-serif;
      font-weight: 700; color: #fff;
      letter-spacing: 8px; margin-bottom: 30px;
      text-shadow: 0 0 15px var(--glow);
    }

    .input-wrap { position: relative; margin-bottom: 25px; }
    
    .form-control {
      background: transparent !important;
      border: none; border-bottom: 1px solid rgba(0, 255, 65, 0.3);
      border-radius: 0; color: var(--glow) !important;
      padding: 10px 5px; font-size: 0.9rem;
    }

    .form-control:focus {
      box-shadow: none; border-bottom: 1px solid var(--glow);
    }

    .btn-execute {
      background: var(--glow);
      color: #000; font-weight: 900;
      border: none; width: 100%;
      padding: 15px; margin-top: 20px;
      letter-spacing: 4px; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
      transition: 0.3s;
    }

    .btn-execute:hover {
      background: #fff; box-shadow: 0 0 30px #fff;
      transform: scale(1.05) translateZ(30px);
    }

    .glitch-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1) 0px, rgba(0,0,0,0.1) 1px, transparent 2px);
      pointer-events: none;
    }
  </style>
</head>
<body>

  <canvas id="flowfield"></canvas>

  <div class="interface-layer">
    <div class="quantum-card" data-tilt data-tilt-glare data-tilt-max-glare="0.1">
      <div class="glitch-overlay"></div>
      <div id="boot-log" class="boot-text"></div>
      
      <h2 class="text-center">SECURE</h2>
      
      <div class="input-wrap">
        <input type="text" class="form-control" placeholder="> USER_IDENTITY">
      </div>
      
      <div class="input-wrap">
        <input type="password" class="form-control" placeholder="> PASS_PHRASE">
      </div>

      <button class="btn-execute" id="loginBtn">INITIALIZE</button>
      
      <div class="mt-4 text-center" style="font-size: 0.6rem; color: #004400;">
        STATUS: ENCRYPTED // NODE: 77-X9
      </div>
    </div>
  </div>

  <script>
    // --- 1. THE FLOW FIELD ENGINE ---
    const canvas = document.getElementById('flowfield');
    const ctx = canvas.getContext('2d');
    let particles = [];
    const particleCount = 1500;

    class Particle {
      constructor() {
        this.reset();
      }
      reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.speed = Math.random() * 2 + 1;
        this.history = [];
        this.maxLength = Math.floor(Math.random() * 15 + 5);
        this.angle = 0;
      }
      draw() {
        ctx.strokeStyle = 'rgba(0, 255, 65, 0.15)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        if (this.history.length > 0) {
          ctx.moveTo(this.history[0].x, this.history[0].y);
          for (let i = 1; i < this.history.length; i++) {
            ctx.lineTo(this.history[i].x, this.history[i].y);
          }
        }
        ctx.stroke();
      }
      update() {
        this.angle = (Math.sin(this.x * 0.01) + Math.cos(this.y * 0.01)) * 2;
        this.x += Math.cos(this.angle) * this.speed;
        this.y += Math.sin(this.angle) * this.speed;
        this.history.push({x: this.x, y: this.y});
        if (this.history.length > this.maxLength) this.history.shift();
        if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
      }
    }

    function init() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      particles = [];
      for (let i = 0; i < particleCount; i++) particles.push(new Particle());
    }

    function animate() {
      ctx.fillStyle = 'rgba(0, 5, 0, 0.05)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(animate);
    }

    init(); animate();
    window.addEventListener('resize', init);

    // --- 2. THE TERMINAL BOOT LOG ---
    const logs = [
      "Initialising quantum handshake...",
      "Bypassing firewall nodes...",
      "Decrypting biometric hash...",
      "Uplink established. Awaiting input.",
      "Proxy layers active: 4"
    ];
    let logIndex = 0;
    const logEl = document.getElementById('boot-log');

    function updateLog() {
      logEl.innerHTML += `> ${logs[logIndex]}<br>`;
      logIndex = (logIndex + 1) % logs.length;
      if (logEl.scrollHeight > 50) logEl.scrollTop = logEl.scrollHeight;
      setTimeout(updateLog, 2000);
    }
    updateLog();

    // --- 3. THE GLITCH BUTTON ---
    const btn = document.getElementById('loginBtn');
    const originalText = btn.innerText;
    const chars = "ABCDEFGHIJKLMN0123456789!@#$%^&*";

    btn.addEventListener('mouseover', () => {
      let iteration = 0;
      const interval = setInterval(() => {
        btn.innerText = originalText.split("").map((char, index) => {
          if (index < iteration) return originalText[index];
          return chars[Math.floor(Math.random() * 30)];
        }).join("");
        if (iteration >= originalText.length) clearInterval(interval);
        iteration += 1 / 3;
      }, 30);
    });

    VanillaTilt.init(document.querySelector(".quantum-card"));
  </script>
</body>
</html>
